  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fa; padding:24px; }
    .container { max-width: 1250px; margin:auto; background:#fff; padding:24px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,.08); }
    h1 { margin:0 0 8px; font-size:22px; }
    .sub { color:#556; margin-bottom: 18px; font-size: 13px; }

    label { font-size: 13px; color:#223; font-weight:600; }
    select, button { padding:8px 10px; font-size:14px; margin-top:6px; }
    select { min-width: 520px; }
    button { cursor:pointer; border:0; border-radius:8px; background:#2563eb; color:white; }
    button.secondary { background:#334155; }

    .controls { display:flex; align-items:flex-end; gap:10px; flex-wrap:wrap; }

    .card { margin-top:16px; border:1px solid #e6e8ee; border-radius:10px; overflow:hidden; }
    .card-head { background:#f8fafc; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; }
    .note { font-size:12px; color:#667; }

    table { width:100%; border-collapse:collapse; }
    th, td { border-top:1px solid #eef0f5; padding:8px 10px; text-align:center; font-size:13px; vertical-align:top; }
    th:first-child, td:first-child { text-align:left; width: 320px; }
    th { background:#fbfcfe; font-weight:700; }

    .intel { background:#eff6ff; }
    .amd { background:#fff7ed; }

    .split { display:grid; grid-template-columns: 1fr; gap:16px; }
    @media (min-width: 1000px){ .split { grid-template-columns: 1fr 1fr; } }

    .small { font-size:12px; color:#667; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .nowrap { white-space: pre-wrap; }
  </style>
</head>

  const cpuById = Object.fromEntries(DATA.cpus.map(c => [c.id, c]));
  const intelList = DATA.cpus.filter(c => c.vendor === 'Intel' && c.model);

  const sel = document.getElementById('intelSelect');
  const amdMeta = document.getElementById('amdMeta');
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');
  const allMapBody = document.getElementById('allMapBody');

  // Keep Excel-like parameter order
  const PARAM_ORDER = ['Platform','Generation','Model', ...(DATA.paramOrder || [])];

  function escapeHtml(s){
    return String(s)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'",'&#39;');
  }

  function getVal(cpu, key){
    if (!cpu) return '';
    if (key === 'Platform') return cpu.platform || '';
    if (key === 'Generation') return cpu.generation || '';
    if (key === 'Model') return cpu.model || '';
    return (cpu.specs && cpu.specs[key]) ? cpu.specs[key] : '';
  }

  // If Intel has no explicit AMD recommendation, fall back to AMDs in same block.
  function getAmdIdsForIntel(intelId){
    let amdIds = (DATA.recommendations && Array.isArray(DATA.recommendations[intelId])) ? DATA.recommendations[intelId] : [];
    if (!amdIds || amdIds.length === 0){
      const intel = cpuById[intelId];
      if (intel && typeof intel.block === 'number'){
        amdIds = DATA.cpus.filter(c => c.vendor === 'AMD' && c.block === intel.block).map(c => c.id);
      }
    }
    return Array.from(new Set((amdIds || []).filter(Boolean)));
  }

  // Build display labels; de-duplicate identical labels by suffixing (2), (3)...
const labelCounter = {};

intelList
  .sort((a, b) =>
    (a.generation || '').localeCompare(b.generation || '') ||
    (a.model || '').localeCompare(b.model || '')
  )
  .forEach(cpu => {
    const baseLabel = `${cpu.model} (${cpu.generation || 'Unknown'})`;
    labelCounter[baseLabel] = (labelCounter[baseLabel] || 0) + 1;

    const label =
      labelCounter[baseLabel] > 1
        ? `${baseLabel} – Variant ${labelCounter[baseLabel]}`
        : baseLabel;

    const opt = document.createElement('option');
    opt.value = cpu.id;
    opt.textContent = label;
    sel.appendChild(opt);
  });


  function renderFullList(){
    allMapBody.innerHTML = '';
    intelList
      .slice()
      .sort((a,b)=> (a.generation||'').localeCompare(b.generation||'') || (a.model||'').localeCompare(b.model||''))
      .forEach(intel => {
        const amdIds = getAmdIdsForIntel(intel.id);
        const amdModels = amdIds.map(id => (cpuById[id] ? cpuById[id].model : '')).filter(Boolean).join(', ');
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${escapeHtml(intel.model||'')}</td><td>${escapeHtml(intel.generation||'')}</td><td>${escapeHtml(amdModels)}</td>`;
        allMapBody.appendChild(tr);
      });
  }

  function renderSelected(){
    const intel = cpuById[sel.value];
    const amdIds = getAmdIdsForIntel(sel.value);
    const amds = amdIds.map(id => cpuById[id]).filter(Boolean);
    const cols = [intel, ...amds];

   

    thead.innerHTML = '<tr><th>Specification</th>' + cols.map(c => {
      const cls = c.vendor === 'Intel' ? 'intel' : 'amd';
      return `<th class="${cls}">${escapeHtml(c.vendor)} — ${escapeHtml(c.model||'')}</th>`;
    }).join('') + '</tr>';

    let htmlRows = '';
    PARAM_ORDER.forEach(p => {
      const vals = cols.map(c => getVal(c,p));
      const any = vals.some(v => String(v).trim() !== '');
      if (!any) return;
      htmlRows += '<tr><td><b>' + escapeHtml(p) + '</b></td>' + vals.map(v => `<td class="nowrap">${escapeHtml(v || '-') }</td>`).join('') + '</tr>';
    });
    tbody.innerHTML = htmlRows;
  }

  sel.addEventListener('change', renderSelected);
  if (intelList.length) sel.selectedIndex = 0;
  renderFullList();
  renderSelected();

  // ---------- PDF EXPORT (TEXT TABLE, NOT IMAGE) ----------
  function buildSelectedTableForPdf(){
    const intel = cpuById[sel.value];
    const amdIds = getAmdIdsForIntel(sel.value);
    const amds = amdIds.map(id => cpuById[id]).filter(Boolean);
    const cols = [intel, ...amds];

    const head = ['Specification', ...cols.map(c => `${c.vendor} — ${c.model}`)];
    const body = [];

    PARAM_ORDER.forEach(p => {
      const row = [p, ...cols.map(c => getVal(c,p) || '-')];
      if (row.slice(1).some(v => String(v).trim() !== '-' && String(v).trim() !== '')){
        body.push(row);
      }
    });

    return { head, body, intel, amds };
  }

  function downloadSelectedPdf(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'p', unit: 'pt', format: 'a4' });

    const { head, body, intel, amds } = buildSelectedTableForPdf();

    doc.setFontSize(14);
    doc.text('Processor Comparison', 40, 40);

    doc.setFontSize(10);
    
    

    doc.autoTable({
      startY: 88,
      head: [head],
      body,
      theme: 'grid',
      styles: { fontSize: 9, cellPadding: 4, overflow: 'linebreak' },
      headStyles: { fillColor: [37, 99, 235] },
      columnStyles: { 0: { cellWidth: 170 } }
    });

    const safe = (s) => String(s||'').replace(/[^a-z0-9\-_\.]+/gi,'_').slice(0,80);
    const fname = safe(intel.model) + '_vs_' + safe(amds.map(a=>a.model).join('_') || 'no_amd') + '.pdf';
    doc.save(fname);
  }

  function downloadFullListPdf(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'p', unit: 'pt', format: 'a4' });

    doc.setFontSize(14);
    doc.text('Intel → AMD Mapping List (from comparison for website.xlsx)', 40, 40);

    const head = ['Intel Processor', 'Intel Generation', 'Recommended AMD Processor(s)'];
    const body = intelList
      .slice()
      .sort((a,b)=> (a.generation||'').localeCompare(b.generation||'') || (a.model||'').localeCompare(b.model||''))
      .map(intel => {
        const amdIds = getAmdIdsForIntel(intel.id);
        const amdModels = amdIds.map(id => (cpuById[id] ? cpuById[id].model : '')).filter(Boolean).join(', ');
        return [intel.model || '-', intel.generation || '-', amdModels || '-'];
      });

    doc.autoTable({
      startY: 58,
      head: [head],
      body,
      theme: 'grid',
      styles: { fontSize: 9, cellPadding: 4, overflow: 'linebreak' },
      headStyles: { fillColor: [51, 65, 85] },
      columnStyles: { 0: { cellWidth: 200 }, 1: { cellWidth: 120 }, 2: { cellWidth: 240 } }
    });

    doc.save('intel_to_amd_mapping_list.pdf');
  }

  window.downloadSelectedPdf = downloadSelectedPdf;
  window.downloadFullListPdf = downloadFullListPdf;
</script>
</body>
