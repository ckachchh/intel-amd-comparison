  // =========================

  const cpuById = Object.fromEntries(DATA.cpus.map(c => [c.id, c]));

  const segmentSelect = document.getElementById("segmentSelect");
  const intelSelect   = document.getElementById("intelSelect");
  const countPill     = document.getElementById("countPill");

  const thead   = document.getElementById("thead");
  const tbody   = document.getElementById("tbody");
  const amdMeta = document.getElementById("amdMeta");

  const PARAM_ORDER = ["Segment", "Platform", "Generation", "Model", ...(DATA.paramOrder || [])];

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function getVal(cpu, key){
    if (!cpu) return "";
    if (key === "Segment") return cpu.segment || "";
    if (key === "Platform") return cpu.platform || "";
    if (key === "Generation") return cpu.generation || "";
    if (key === "Model") return cpu.model || "";
    return (cpu.specs && cpu.specs[key]) ? cpu.specs[key] : "";
  }

  // If Intel has no explicit AMD recommendation, fall back to AMDs in same block AND same segment
  function getAmdIdsForIntel(intelId){
    let amdIds = (DATA.recommendations && Array.isArray(DATA.recommendations[intelId]))
      ? DATA.recommendations[intelId]
      : [];

    if (!amdIds || amdIds.length === 0){
      const intel = cpuById[intelId];
      if (intel && typeof intel.block === "number"){
        amdIds = DATA.cpus
          .filter(c => c.vendor === "AMD" && c.block === intel.block && c.segment === intel.segment)
          .map(c => c.id);
      }
    }
    return Array.from(new Set((amdIds || []).filter(Boolean)));
  }

  function getFilteredIntelList(){
    const seg = (segmentSelect.value || "All").trim().toLowerCase();

    return DATA.cpus
      .filter(c => (c.vendor || "").trim().toLowerCase() === "intel" && c.model)
      .filter(c => seg === "all" || (c.segment || "").trim().toLowerCase() === seg)
      .slice()
      .sort((a,b) =>
        (a.generation || "").localeCompare(b.generation || "") ||
        (a.model || "").localeCompare(b.model || "")
      );
  }

  function populateIntelDropdown(){
    const list = getFilteredIntelList();
    intelSelect.innerHTML = "";

    const labelCounter = {};
    list.forEach(cpu => {
      const baseLabel = `${cpu.model} (${cpu.generation || "Unknown"})`;
      labelCounter[baseLabel] = (labelCounter[baseLabel] || 0) + 1;

      const label = labelCounter[baseLabel] > 1
        ? `${baseLabel} – Variant ${labelCounter[baseLabel]}`
        : baseLabel;

      const opt = document.createElement("option");
      opt.value = cpu.id;
      opt.textContent = label;
      intelSelect.appendChild(opt);
    });


    console.log("Segment selected:", segmentSelect.value, "| Intel Found:", list.length);

    if (list.length) intelSelect.selectedIndex = 0;
    renderSelected();
  }

  function renderSelected(){
    const intel = cpuById[intelSelect.value];

    if (!intel){
      thead.innerHTML = "";
      tbody.innerHTML = "";
      amdMeta.textContent = "No Intel processor available for this segment.";
      return;
    }

    const amdIds = getAmdIdsForIntel(intelSelect.value);
    const amds = amdIds.map(id => cpuById[id]).filter(Boolean);
    const cols = [intel, ...amds];

    amdMeta.textContent = amds.length
      ? `Recommended AMD: ${amds.map(a => a.model).join(", ")}`
      : "No AMD mapping found.";

    thead.innerHTML =
      `<tr><th>Specification</th>` +
      cols.map(c => {
        const cls = c.vendor === "Intel" ? "intel" : "amd";
        return `<th class="${cls}">${escapeHtml(c.vendor)} — ${escapeHtml(c.model || "")}</th>`;
      }).join("") +
      `</tr>`;

    let rows = "";
    PARAM_ORDER.forEach(p => {
      const vals = cols.map(c => getVal(c, p));
      const any = vals.some(v => String(v).trim() !== "");
      if (!any) return;

      rows +=
        `<tr><td><b>${escapeHtml(p)}</b></td>` +
        vals.map(v => `<td class="nowrap">${escapeHtml(v || "-")}</td>`).join("") +
        `</tr>`;
    });

    tbody.innerHTML = rows;
  }

  // events + init
  segmentSelect.addEventListener("change", populateIntelDropdown);
  intelSelect.addEventListener("change", renderSelected);
  populateIntelDropdown();
</script>
